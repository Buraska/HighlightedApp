version: '3.8'

services:
  front-end:
    container_name: front-end
    build:
      context: ../FrontEnd/
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:8080"
  
  webapp:
    container_name: webapp
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - webapp-postgres
    restart: unless-stopped
    environment:
      - "ConnectionStrings:NpgsqlConnection=Host=webapp-postgres;Port=5432;Username=postgres;Password=postgres;database=Webapp;IncludeErrorDetail=true"
    ports:
      - "7192:80"
  
  webapp-postgres:
    container_name: webapp-postgres
    image: postgres:latest
    restart: unless-stopped
    environment:
      - POSTGEST_user=postgres
      - POSTGRES_PASSWORD=postgres
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5432:5432"
  
    volumes:
        - webapp-postgres-volume:/var/lib/postgresql

volumes:
  webapp-postgres-volume: 

